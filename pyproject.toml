[tool.ruff]
include = ["packages/**/*.py", "packages/**/*.pyi"]

[tool.ruff.lint.isort]
known-first-party = [
  "hls_utilities",
  "hls_browse_imagery",
]

[tool.pixi.workspace]
name = "hls-atmospheric-correction"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tool.pixi.pypi-dependencies]
hls-atmospheric-correction = { path = ".", editable = true }
