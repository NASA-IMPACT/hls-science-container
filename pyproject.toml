[tool.ruff]
line-length = 88
target-version = "py312"
include = ["packages/**/*.py", "packages/**/*.pyi"]

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP"]
ignore = ["E501", "E731"]

[tool.ruff.lint.isort]
known-first-party = [
  "hls_utilities",
  "hls_browse_imagery",
]

[tool.mypy]
strict = true
python_version = "3.13"
namespace_packages = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = [
  "tests.*",
  "*.tests.*"
]
strict = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
warn_return_any = false

[tool.pixi.workspace]
name = "hls-science-container"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tool.pixi.pypi-dependencies]
hls-science-container = { path = ".", editable = true }
