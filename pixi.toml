[workspace]
name = "hls-atmospheric-correction"
version = "0.1.0"
platforms = ["linux-64", "osx-arm64"]
channels = ["conda-forge"]
preview = ["pixi-build"]

[target.linux-64.dependencies]
# C packages can only be compiled on Linux x86_64
espa-product-formatter = { path = "packages/espa-product-formatter" }
espa-surface-reflectance = { path = "packages/espa-surface-reflectance" }
hls-libs = { path = "packages/hls-libs" }

[pypi-dependencies]
# Remote repositories
hls-browse-imagery-creator = { git = "https://github.com/NASA-IMPACT/hls-browse_imagery", tag = "v1.8"}
hls-cmr_stac = { git = "https://github.com/NASA-IMPACT/hls-cmr_stac", tag = "v1.8" }
hls-hdf_to_cog = { git = "https://github.com/NASA-IMPACT/hls-hdf_to_cog", tag = "v2.2" }
hls-manifest = { git = "https://github.com/NASA-IMPACT/hls-manifest", tag = "v2.1" }
metadata-creator = { git = "https://github.com/NASA-IMPACT/hls-metadata", tag = "v2.8" }
hls-thumbnails = { git = "https://github.com/NASA-IMPACT/hls-thumbnails", tag=  "v1.3" }
hls-utilities = { git = "https://github.com/NASA-IMPACT/hls-utilities", tag = "v1.11.3" }
hls-vi = { url = "https://github.com/NASA-IMPACT/hls-vi/releases/download/v1.20/hls_vi-1.20.tar.gz" }

[dependencies]
# Local packages
hls-nextgen-orchestration = { path = "./src/hls-nextgen-orchestration" }
# Dependencies we source via Conda for easier install
python = ">=3.13,<3.14"
awscliv2 = "~=2"
gdal = "*"
libgdal-hdf4 = ">=3.10.3,<4"
libgdal-jp2openjpeg = "*"
rasterio = "*"
pyproj = ">=3.7.2,<4"
shapely = ">=2,<3"
zip = "*"
unzip = "*"

[feature.dev.dependencies]
ruff = "*"
mypy = "*"
pytest = "*"

[feature.orchestration.pypi-dependencies]
hls-nextgen-orchestration = { path = "./src/hls-nextgen-orchestration", editable = true, extras = ["dev"] }

[environments]
dev = { features = ["dev", "orchestration"], no-default-feature = true }
