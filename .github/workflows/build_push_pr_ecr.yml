name: build_push_pr_ecr

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: hls-atmospheric-correction

jobs:
  build_push_to_ecr:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false  # takes too long for ~4.7GB

      # - name: Lint code
      #   run: |
      #     scripts/lint
      #     scripts/typecheck

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.ECR_REPOSITORY }}:local
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache

      # FIXME: run the tests in the container...
      #    - that's really what matters for this project
      #    - the C code deps are hard to build
      # - name: Run tests
      #   run: |
      #     scripts/test

      - name: Build and Push to ECR
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:pr-${{ github.event.number }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache,mode=max
