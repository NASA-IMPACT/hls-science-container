name: build_push_pr_ecr

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: hls-atmospheric-correction
  # Docker build args
  BUILD_PLATFORM: linux/amd64
  FMASK_INSTALLER: https://fmask4installer.s3.amazonaws.com/Fmask_4_7_issue40_Linux_mcr.install

jobs:
  build_push_to_ecr:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      # We run out of space w/o cleanup. This is less comprehensive but faster
      # than `jlumbroso/free-disk-space`
      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # - name: Lint code
      #   run: |
      #     scripts/lint
      #     scripts/typecheck

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Rattler/Pixi packages
        uses: actions/cache@v4
        with:
          path: /tmp/.pixi-cache
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-pixi-

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true  # Puts the image in 'docker images' for the next step
          provenance: false
          sbom: false
          target: prod
          build-args: |
            PLATFORM=${{ env.BUILD_PLATFORM }}
            FMASK_INSTALLER=${{ env.FMASK_INSTALLER }}
          tags: ${{ env.ECR_REPOSITORY }}:local
          # Combine ECR layer cache AND local file cache
          cache-from: |
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache
            type=local,src=/tmp/.pixi-cache
          # Export new package downloads to the local cache folder
          cache-to: type=local,dest=/tmp/.pixi-cache-new,mode=max

      # FIXME: run the tests in the container...
      #    - that's really what matters for this project
      #    - the C code deps are hard to build
      - name: Run tests
        run: |
          docker run --rm ${{ env.ECR_REPOSITORY }}:local echo "placeholder"

      - name: Build and Push to ECR
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          target: prod
          build-args: |
            PLATFORM=${{ env.BUILD_PLATFORM }}
            FMASK_INSTALLER=${{ env.FMASK_INSTALLER }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache
            type=local,src=/tmp/.pixi-cache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:cache,mode=max

      # Refresh the GitHub Actions cache with new downloads
      # This ensures the cache is updated if pixi.lock changed
      - name: Move Pixi cache
        run: |
          rm -rf /tmp/.pixi-cache
          mv /tmp/.pixi-cache-new /tmp/.pixi-cache
